name: Feature request
description: Propose an improvement with a clear user outcome
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What user problem should FinalPilot solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed outcome
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives and trade-offs
