# ==========================================
# FinalPilot（学呀学）GitHub Actions CI 工作流
# 用途：自动构建验证 + 代码规范检查
# ==========================================

name: CI

# 触发条件：main 分支的 push 和 pull_request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 取消同一分支上的旧工作流，节省资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # 使用 macOS 运行器，自带 Xcode 环境
    runs-on: macos-15

    # 设置超时，防止异常挂起
    timeout-minutes: 30

    steps:
      # 步骤 1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 打印构建环境
        run: |
          swift --version
          xcodebuild -version
          xcodebuild -list -project FinalPilotApp.xcodeproj

      - name: 选择可用 iPhone 模拟器
        id: simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | jq -r '[.devices[][] | select(.isAvailable and (.name | startswith("iPhone")))][0].udid // empty')
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator is installed on this runner." >&2
            exit 1
          fi
          echo "id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: 构建并执行单元测试
        run: |
          xcodebuild \
            -project FinalPilotApp.xcodeproj \
            -scheme FinalPilotApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath "${{ runner.temp }}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            test

  lint:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 SwiftLint
        run: brew install swiftlint

      - name: 执行 SwiftLint 检查
        # Existing style warnings remain visible while correctness rules with
        # error severity continue to gate the build. This avoids converting the
        # whole historical style backlog into an unrelated release blocker.
        run: swiftlint lint --reporter github-actions-logging
